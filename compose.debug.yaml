# Local dev overrides — use with:
#   docker compose -f compose.yaml -f compose.debug.yaml up --build
#
# Site:  http://localhost:3000  (nginx → /api proxy)
# API:   http://localhost:5241  (direct, for Swagger/testing)
# Qdrant UI: http://localhost:6333/dashboard

services:
  portfolio-web:
    ports:
      - "3000:80"

  portfolio-api:
    ports:
      - "5241:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"
