server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # .NET API (chatbot, contact, RAG)
    location /api/ {
        proxy_pass http://portfolio-api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    location /health {
        proxy_pass http://portfolio-api:8080/health;
    }

    # Static assets (PDF, images, etc.) — never SPA-fallback to index.html
    location ~* \.(pdf|png|jpe?g|gif|svg|ico|webp|woff2?|ttf|eot|json|txt|xml)$ {
        try_files $uri =404;
        expires 7d;
    }

    # React SPA (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
